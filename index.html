<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Defender | Institutional Asset Protection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #10b981; /* Electric Emerald */
            --dark-navy: #0a192f; 
            --slate: #1e293b;
            --white: #ffffff; 
            --text-muted: #94a3b8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--white); background: #020617; line-height: 1.6; }

        header {
            height: 90vh;
            background: linear-gradient(rgba(10, 25, 47, 0.9), rgba(10, 25, 47, 0.9)), 
                        url('./nashville.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero-content h1 { font-size: 4.5rem; font-weight: 800; margin-bottom: 1rem; letter-spacing: -2px; }
        .hero-content p { font-size: 1.5rem; max-width: 850px; margin: 0 auto; color: var(--text-muted); font-weight: 300; }
        .hero-content span { color: var(--primary); }

        section { padding: 100px 10%; max-width: 1300px; margin: 0 auto; }
        
        .mission-card { 
            background: var(--dark-navy); 
            padding: 60px; 
            border-radius: 12px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            margin-top: -120px; 
            position: relative; 
            z-index: 10; 
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-top: 8px solid var(--primary);
        }

        h2 { font-size: 2.2rem; margin-bottom: 1.5rem; font-weight: 700; }
        .accent-text { color: var(--primary); text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; margin-bottom: 10px; display: block; }

        .service-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; margin-top: 60px; }
        .service-item { 
            background: rgba(30, 41, 59, 0.5); 
            padding: 45px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.4s;
        }
        .service-item:hover { border-color: var(--primary); transform: translateY(-10px); background: rgba(16, 185, 129, 0.05); }
        .service-item h3 { color: var(--primary); margin-bottom: 20px; font-size: 1.6rem; }
        .service-item p { color: var(--text-muted); }

        .founder-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 80px; align-items: center; margin-top: 80px; }
        .founder-img { width: 100%; border-radius: 12px; filter: grayscale(20%); border: 1px solid rgba(16, 185, 129, 0.4); }

        .contact-wrap { background: var(--dark-navy); padding: 80px; border-radius: 20px; border: 1px solid rgba(16, 185, 129, 0.2); margin-top: 60px; }
        .form-input { 
            width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 6px; 
            border: 1px solid #334155; background: #0f172a; color: white; outline: none;
        }
        .form-input:focus { border-color: var(--primary); }
        .btn-submit { 
            background: var(--primary); color: var(--dark-navy); padding: 22px; 
            width: 100%; border: none; border-radius: 6px; font-weight: 800; 
            cursor: pointer; transition: 0.3s; font-size: 1.1rem;
        }
        .btn-submit:hover { background: #0ea171; transform: scale(1.01); }

        footer { text-align: center; padding: 60px; font-size: 0.85rem; color: var(--text-muted); border-top: 1px solid rgba(255,255,255,0.05); }
        
        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2.8rem; }
            .founder-grid { grid-template-columns: 1fr; }
            .mission-card { padding: 30px; }
            .hero-content img { height: 250px !important; } /* Scales logo for mobile */
        }
    </style>
</head>

        <div class="hero-content">
